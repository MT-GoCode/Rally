<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="katex.min.css">
<link rel="stylesheet" href="highlight-github-dark.css">
<style>
  @font-face { font-family: "Inter"; font-weight: 400; font-style: normal; font-display: swap; src: url("inter-400.woff2") format("woff2"); }
  @font-face { font-family: "Inter"; font-weight: 500; font-style: normal; font-display: swap; src: url("inter-500.woff2") format("woff2"); }
  @font-face { font-family: "Inter"; font-weight: 600; font-style: normal; font-display: swap; src: url("inter-600.woff2") format("woff2"); }
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: #1e1e1e; color: #e6e6e6;
    font: 14.5px/1.6 "Inter", -apple-system, system-ui, sans-serif; letter-spacing: -0.003em;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #messages { flex: 1 1 auto; overflow-y: scroll; overflow-x: hidden; padding: 14px; -webkit-user-select: text; }
  .row { display: flex; margin: 0 0 14px; }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble { position: relative; padding: 8px 12px; border-radius: 12px; max-width: 82%; overflow-wrap: anywhere; }
  .user .bubble { background: rgba(10,132,255,0.22); }
  .assistant .bubble { background: rgba(160,160,160,0.15); max-width: 92%; }
  .interruption .bubble { background: rgba(255,159,10,0.20); }
  .intlabel { font-size: 8px; font-weight: 700; letter-spacing: .5px; color: #ff9f0a; margin-bottom: 4px; }
  .bubble p:first-child { margin-top: 0; } .bubble p:last-child { margin-bottom: 0; }
  .bubble pre { background: #0d0d0d; border-radius: 8px; padding: 10px; overflow-x: auto; }
  .bubble code { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; }
  .bubble :not(pre) > code { background: rgba(160,160,160,0.20); padding: 1px 4px; border-radius: 4px; }
  .bubble table { border-collapse: collapse; margin: 8px 0; display: block; overflow-x: auto; }
  .bubble th, .bubble td { border: 1px solid rgba(160,160,160,0.35); padding: 5px 9px; text-align: left; }
  .bubble th { background: rgba(160,160,160,0.12); }
  .bubble blockquote { border-left: 3px solid rgba(160,160,160,0.4); margin: 6px 0; padding-left: 10px; color: #bdbdbd; }
  .imgstrip { display: flex; gap: 6px; overflow-x: auto; overflow-y: hidden; margin: 2px 0 6px; padding-bottom: 2px; }
  .imgstrip img { height: 110px; width: auto; max-width: 200px; object-fit: cover; border-radius: 6px; flex: 0 0 auto; cursor: zoom-in; }
  .bubble a { color: #4aa3ff; }
  .row.sel .bubble { outline: 2px solid #0a84ff; outline-offset: 1px; }
  .divider { display: flex; align-items: center; gap: 8px; color: #8a8a8a; font-size: 9px; margin: 6px 2px 14px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(160,160,160,0.3); }
  .appendix { margin-top: 8px; font-size: 12px; color: #9a9a9a; }
  .appendix summary { cursor: pointer; color: #7a7a7a; }
  .usertext { white-space: pre-wrap; }                 /* user messages: the nice sans, not monospace */
  .src { white-space: pre-wrap; font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px; }
  /* ⋯ menu sits OUTSIDE the bubble, to its right */
  .dotswrap { position: relative; align-self: flex-start; margin: 2px 0 0 4px; flex: 0 0 auto; }
  .dots { color: #8a8a8a; cursor: pointer; font-size: 16px; line-height: 1; opacity: 0; padding: 3px 6px; border-radius: 6px; }
  .row.assistant:hover .dots, .row.sel .dots { opacity: 1; }
  .dots:hover { background: rgba(160,160,160,0.15); color: #e6e6e6; }
  .menu { position: absolute; top: 26px; left: 0; background: #2b2b2b; border: 1px solid rgba(160,160,160,0.3);
    border-radius: 8px; padding: 4px; z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none; }
  .menu.open { display: block; }
  .menu button { display: block; width: 100%; text-align: left; background: none; border: 0; color: #e6e6e6;
    font: inherit; padding: 5px 10px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
  .menu button:hover { background: rgba(10,132,255,0.3); }
  #composer-wrap { flex: 0 0 auto; border-top: 1px solid rgba(160,160,160,0.2); padding: 8px 12px; background: #1a1a1a; }
  /* image SEND QUEUE: single horizontal-scrolling row, delete ✕ on each, click to zoom */
  #thumbs { display: flex; gap: 8px; overflow-x: auto; overflow-y: hidden; margin-bottom: 8px; }
  #thumbs:empty { display: none; }
  .thumb { position: relative; flex: 0 0 auto; }
  .thumb img { height: 48px; width: auto; border-radius: 6px; display: block; cursor: zoom-in; border: 1px solid rgba(160,160,160,0.25); }
  .thumb .rm { position: absolute; top: -6px; right: -6px; width: 17px; height: 17px; border-radius: 50%;
    background: #d0342c; color: #fff; font-size: 12px; line-height: 16px; text-align: center; cursor: pointer; border: 1px solid #1a1a1a; }
  #composer-row { display: flex; align-items: flex-end; gap: 8px; }
  #composer { flex: 1 1 auto; min-height: 22px; max-height: 40vh; overflow-y: auto; background: transparent;
    border: 0; outline: none; color: #e6e6e6; font: inherit; resize: none; }
  #composer::placeholder { color: #6a6a6a; }
  #buttons { flex: 0 0 auto; display: flex; gap: 6px; }
  #buttons button { border: 0; border-radius: 8px; padding: 6px 12px; font: inherit; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn-primary { background: #0a84ff; color: #fff; }
  .btn-stop { background: #d0342c; color: #fff; }
  .btn-ghost { background: rgba(160,160,160,0.22); color: #e6e6e6; }
  #buttons button:disabled { opacity: 0.4; cursor: default; }
  #voice { display: none; align-items: center; gap: 7px; font-size: 12px; color: #ff6b60; font-weight: 500; margin-bottom: 8px; }
  #voice .vdot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b30; animation: vpulse 1.1s ease-in-out infinite; }
  #voice.proc { color: #9a9a9a; } #voice.proc .vdot { background: #9a9a9a; animation: none; }
  @keyframes vpulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.8); } }
  #zoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
  #zoom img { max-width: 92%; max-height: 92%; border-radius: 8px; }
  #toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(6px);
    background: rgba(38,38,38,0.96); border: 1px solid rgba(160,160,160,0.25); color: #e6e6e6; padding: 6px 14px;
    border-radius: 9px; font-size: 12px; font-weight: 500; opacity: 0; transition: opacity .16s, transform .16s;
    pointer-events: none; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="messages"></div>
  <div id="composer-wrap">
    <div id="voice"></div>
    <div id="thumbs"></div>
    <div id="composer-row">
      <textarea id="composer" rows="1" placeholder="Space to type · hold ⌃⇧ to talk · ↑ to review replies"></textarea>
      <div id="buttons">
        <button id="btnSend" class="btn-primary">Send</button>
        <button id="btnInterrupt" class="btn-primary" style="display:none">Interrupt &amp; Send</button>
        <button id="btnStop" class="btn-stop" style="display:none">Stop</button>
      </div>
    </div>
  </div>
</div>
<div id="zoom"><img alt=""></div>
<div id="toast"></div>
<script src="markdown-it.min.js"></script>
<script src="highlight.min.js"></script>
<script src="katex.min.js"></script>
<script src="katex-auto-render.min.js"></script>
<script>
"use strict";
const bridge = (a) => { try { window.webkit.messageHandlers.rally.postMessage(a); } catch(e) {} };
const md = window.markdownit({ html:false, linkify:true, breaks:false,
  highlight:(s,l)=>{ try{ if(l&&hljs.getLanguage(l)) return hljs.highlight(s,{language:l}).value; }catch(e){} return md.utils.escapeHtml(s); } });
const KATEX = { delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},
  {left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}], throwOnError:false };
const esc = s => s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

const messagesEl = document.getElementById("messages");
const composer = document.getElementById("composer");
const thumbsEl = document.getElementById("thumbs");
const zoomEl = document.getElementById("zoom");
const voiceEl = document.getElementById("voice");
const toastEl = document.getElementById("toast");
let toastTimer = 0;
function toast(msg){ toastEl.textContent = msg; toastEl.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(()=>toastEl.classList.remove("show"), 1100); }
function copyMsg(text){ bridge({action:"copy", text}); toast("Copied"); }   // write to clipboard (Swift) + flash
let MSGS = [], CONV_START = -1, SEL = -1, SRC = {}, streamEl = null, BUSY = false;

function zoom(src){ zoomEl.querySelector("img").src = src; zoomEl.style.display = "flex"; }
zoomEl.onclick = () => { zoomEl.style.display = "none"; };

function agentIndices(){ return MSGS.map((m,i)=>m.role==="assistant"?i:-1).filter(i=>i>=0); }
function atBottom(){ return messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 60; }
function toBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

function renderBody(el, text){
  const parts = text.split("@@APPENDIX@@");
  el.innerHTML = md.render((parts[0]||"").trim());
  try { renderMathInElement(el, KATEX); } catch(e){}
  if (parts.length>1){ try {
    const j = JSON.parse(parts[1].slice(parts[1].indexOf("{")));
    const items = (j.deferred||[]).map(d=>d.item).filter(Boolean).concat(j.training||[]);
    if (items.length){ const d=document.createElement("details"); d.className="appendix";
      d.innerHTML="<summary>notes</summary>"+items.map(i=>"<div>• "+esc(i)+"</div>").join(""); el.appendChild(d); }
  } catch(e){} }
}

function render(msgs, convStart){
  const stick = atBottom();
  if (msgs!==undefined) MSGS = msgs;
  if (convStart!==undefined) CONV_START = convStart;
  // Committed render replaces any live streaming bubble. Cancel a pending stream frame FIRST: the last
  // streamed token schedules a requestAnimationFrame, and if it fires AFTER this render (nondeterministic
  // vs SwiftUI's update) it would find streamEl==null and recreate a duplicate bubble below the committed one.
  if (streamRAF){ cancelAnimationFrame(streamRAF); streamRAF = 0; } pendingStream = null;
  messagesEl.innerHTML = ""; streamEl = null;
  MSGS.forEach((m,i)=>{
    if (CONV_START>0 && i===CONV_START){ const dv=document.createElement("div"); dv.className="divider"; dv.textContent="earlier turns are out of context"; messagesEl.appendChild(dv); }
    const row=document.createElement("div");
    row.className="row "+(m.role==="user"?"user":"assistant")+(m.isInterruption?" interruption":"")+(i===SEL?" sel":"");
    const bub=document.createElement("div"); bub.className="bubble";
    if (m.isInterruption){ const l=document.createElement("div"); l.className="intlabel"; l.textContent="INTERRUPTED TO ADD"; bub.appendChild(l); }
    if (m.images&&m.images.length){ const s=document.createElement("div"); s.className="imgstrip";
      m.images.forEach(src=>{const im=document.createElement("img"); im.src=src; im.onclick=()=>zoom(src); s.appendChild(im);}); bub.appendChild(s); }
    const bodyEl=document.createElement("div");
    if (SRC[i]){ bodyEl.className="src"; bodyEl.textContent=m.text.split("@@APPENDIX@@")[0].trim(); }         // agent: view source (mono)
    else if (m.role==="user"){ bodyEl.className="usertext"; bodyEl.textContent=m.text.split("@@APPENDIX@@")[0].trim(); }  // user: sans
    else { renderBody(bodyEl, m.text); }                                                                     // agent: rendered markdown
    bub.appendChild(bodyEl);
    if (m.interrupted){ const c=document.createElement("div"); c.style.cssText="font-size:11px;color:#8a8a8a"; c.textContent="⎯ interrupted"; bub.appendChild(c); }
    row.appendChild(bub);
    if (m.role==="assistant" && m.id){                    // ⋯ menu OUTSIDE the bubble, to its right
      const wrap=document.createElement("div"); wrap.className="dotswrap";
      const dots=document.createElement("div"); dots.className="dots"; dots.textContent="⋯";
      const menu=document.createElement("div"); menu.className="menu";
      const mk=(label,fn)=>{const b=document.createElement("button"); b.textContent=label; b.onclick=(e)=>{e.stopPropagation(); menu.classList.remove("open"); fn();}; return b;};
      menu.appendChild(mk("Copy · C", ()=>copyMsg((m.text.split("@@APPENDIX@@")[0]).trim())));
      menu.appendChild(mk("View source · S", ()=>{ SRC[i]=!SRC[i]; render(); }));
      menu.appendChild(mk("Reset to here · R", ()=>bridge({action:"reset", id:m.id})));
      dots.onclick=(e)=>{ e.stopPropagation(); document.querySelectorAll(".menu.open").forEach(x=>x.classList.remove("open")); menu.classList.toggle("open"); };
      wrap.appendChild(dots); wrap.appendChild(menu); row.appendChild(wrap);
    }
    messagesEl.appendChild(row);
  });
  if (stick) toBottom();
}
document.addEventListener("click", ()=>document.querySelectorAll(".menu.open").forEach(x=>x.classList.remove("open")));

// ---- streaming (rAF-coalesced; direct per-token push from Swift) ----
let pendingStream=null, streamRAF=0;
function setStream(text){ pendingStream=(text||"…");
  if(streamRAF) return;
  streamRAF=requestAnimationFrame(()=>{ streamRAF=0; const stick=atBottom();
    if(!streamEl){ const row=document.createElement("div"); row.className="row assistant"; const bub=document.createElement("div"); bub.className="bubble"; streamEl=document.createElement("div"); bub.appendChild(streamEl); row.appendChild(bub); messagesEl.appendChild(row); }
    renderBody(streamEl, pendingStream); if(stick) toBottom(); }); }
function endStream(){ if(streamRAF){ cancelAnimationFrame(streamRAF); streamRAF=0; } if(streamEl){ streamEl.closest(".row")?.remove(); streamEl=null; } }

// ---- send queue thumbnails ----
function setThumbs(list){ thumbsEl.innerHTML="";
  (list||[]).forEach((src,idx)=>{ const t=document.createElement("div"); t.className="thumb";
    const im=document.createElement("img"); im.src=src; im.onclick=()=>zoom(src); t.appendChild(im);
    const x=document.createElement("div"); x.className="rm"; x.textContent="✕"; x.title="Remove";
    x.onclick=(e)=>{ e.stopPropagation(); bridge({action:"removeImage", index:idx}); }; t.appendChild(x);
    thumbsEl.appendChild(t); }); }

// ---- send / stop buttons (busy-aware) ----
const btnSend=document.getElementById("btnSend"), btnInterrupt=document.getElementById("btnInterrupt"), btnStop=document.getElementById("btnStop");
function setBusy(b){ BUSY=b; btnSend.style.display=b?"none":""; btnInterrupt.style.display=b?"":"none"; btnStop.style.display=b?"":"none";
  composer.placeholder = b ? "generating… type to interrupt & send · ↑ to review" : "Space to type · hold ⌃⇧ to talk · ↑ to review replies"; }
function submit(){ const t=composer.value; composer.value=""; composer.style.height="auto"; if(t.trim()) bridge({action:"send", text:t}); else bridge({action:"send", text:""}); }
btnSend.onclick=submit; btnInterrupt.onclick=submit; btnStop.onclick=()=>bridge({action:"stop"});

// ---- selection / keyboard nav ----
function setSel(i){ SEL=i; render(); const rows=messagesEl.querySelectorAll(".row"); if(i>=0&&rows[i]) rows[i].scrollIntoView({block:"center"}); }
function selectLast(){ const a=agentIndices(); if(a.length){ composer.blur(); setSel(a[a.length-1]); } }
function focusComposer(){ setSel(-1); composer.focus(); }
function caretAtStart(){ return composer.selectionStart===0 && composer.selectionEnd===0; }

composer.addEventListener("input", ()=>{ composer.style.height="auto"; composer.style.height=Math.min(composer.scrollHeight, window.innerHeight*0.4)+"px"; bridge({action:"input", text:composer.value}); });
composer.addEventListener("focus", ()=>bridge({action:"focus", focused:true}));
composer.addEventListener("blur", ()=>bridge({action:"focus", focused:false}));
composer.addEventListener("paste", (e)=>{ const items=e.clipboardData?.items||[]; for(const it of items){ if(it.type.startsWith("image/")){ const f=it.getAsFile(); const r=new FileReader(); r.onload=()=>bridge({action:"pasteImage", data:String(r.result)}); r.readAsDataURL(f); e.preventDefault(); } } });

document.addEventListener("keydown", (e)=>{
  if (zoomEl.style.display==="flex"){ if(e.key==="Escape"){ zoomEl.style.display="none"; e.preventDefault(); } return; }
  if (e.key==="Escape" && BUSY){ e.preventDefault(); bridge({action:"stop"}); return; }   // Esc interrupts/stops generation (from anywhere)
  const inComposer = document.activeElement===composer;
  if (inComposer){
    if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); submit(); return; }
    if (e.key==="ArrowUp" && caretAtStart()){ e.preventDefault(); selectLast(); return; }
    return;
  }
  const a = agentIndices(); const pos = a.indexOf(SEL);
  if (e.key==="ArrowUp"){ e.preventDefault(); if(pos>0) setSel(a[pos-1]); else if(pos<0&&a.length) setSel(a[a.length-1]); }
  else if (e.key==="ArrowDown"){ e.preventDefault(); if(pos>=0&&pos<a.length-1) setSel(a[pos+1]); else focusComposer(); }
  else if (e.key===" "){ e.preventDefault(); focusComposer(); }
  else if (e.key==="Escape"){ setSel(-1); }
  else if (SEL>=0){ const m=MSGS[SEL];
    if (e.key==="s"){ SRC[SEL]=!SRC[SEL]; render(); }
    else if (e.key==="c"){ copyMsg((m.text.split("@@APPENDIX@@")[0]).trim()); }
    else if (e.key==="r" && m.id){ bridge({action:"reset", id:m.id}); } }
});

// ---- Swift → JS ----
function setComposer(t){ composer.value=t||""; composer.style.height="auto"; composer.style.height=Math.min(composer.scrollHeight, window.innerHeight*0.4)+"px"; }
function insertText(t){ const s=composer.selectionStart||composer.value.length; composer.value = composer.value.slice(0,s)+t+composer.value.slice(composer.selectionEnd||s); composer.style.height="auto"; composer.style.height=Math.min(composer.scrollHeight, window.innerHeight*0.4)+"px"; composer.focus(); bridge({action:"input", text:composer.value}); }
function submitComposer(){ submit(); }
function setVoice(state){                                  // "listening" | "processing" | "" (idle)
  if(state==="listening"){ voiceEl.className=""; voiceEl.innerHTML='<span class="vdot"></span>listening…'; voiceEl.style.display="flex"; }
  else if(state==="processing"){ voiceEl.className="proc"; voiceEl.innerHTML='<span class="vdot"></span>transcribing…'; voiceEl.style.display="flex"; }
  else { voiceEl.style.display="none"; }
}
window.rally = { render, setStream, endStream, setSel, focusComposer, setComposer, insertText, submitComposer, setThumbs, setBusy, setVoice };
composer.focus();
</script>
</body>
</html>
