<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="katex.min.css">
<link id="hl" rel="stylesheet" href="hl-light.css">
<script src="marked.min.js"></script>
<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<script src="highlight.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  /* body text = the SwiftUI bubble text color, adapting to theme */
  :root { --fg: #1d1d1f; --muted: #6b6b70; --rule: rgba(0,0,0,0.14); --codebg: rgba(0,0,0,0.06); }
  :root[data-theme="dark"] { --fg: #f2f2f7; --muted: #9a9aa2; --rule: rgba(255,255,255,0.16); --codebg: rgba(255,255,255,0.09); }
  #c {
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    color: var(--fg); word-wrap: break-word; overflow-wrap: anywhere;
    -webkit-font-smoothing: antialiased;
  }
  #c > *:first-child { margin-top: 0; }
  #c > *:last-child  { margin-bottom: 0; }
  #c p { margin: 0 0 6px; }
  #c h1 { font-size: 16px; font-weight: 700; margin: 8px 0 4px; }
  #c h2 { font-size: 14px; font-weight: 700; margin: 8px 0 4px; }
  #c h3 { font-size: 13px; font-weight: 700; margin: 6px 0 2px; }
  #c h4, #c h5, #c h6 { font-size: 13px; font-weight: 600; margin: 6px 0 2px; }
  #c ul, #c ol { margin: 0 0 6px; padding-left: 22px; }
  #c li { margin: 1px 0; }
  #c li > ul, #c li > ol { margin: 1px 0; }
  #c a { color: #2f7bf6; text-decoration: none; }
  #c a:hover { text-decoration: underline; }
  #c hr { border: none; border-top: 1px solid var(--rule); margin: 8px 0; }
  #c blockquote {
    margin: 0 0 6px; padding: 1px 0 1px 10px;
    border-left: 3px solid var(--rule); color: var(--muted);
  }
  #c code {
    font: 0.92em ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--codebg); padding: 1px 4px; border-radius: 4px;
  }
  #c pre {
    background: var(--codebg); border-radius: 6px; padding: 10px;
    overflow-x: auto; margin: 2px 0 8px;
  }
  #c pre code { background: none; padding: 0; font-size: 12px; line-height: 1.45; }
  #c table { border-collapse: collapse; margin: 2px 0 8px; display: block; overflow-x: auto; }
  #c th, #c td { border: 1px solid var(--rule); padding: 4px 8px; text-align: left; }
  #c th { font-weight: 600; }
  #c img { max-width: 100%; border-radius: 6px; }
  #c .katex-display { margin: 6px 0; overflow-x: auto; overflow-y: hidden; padding: 2px 0; }
  #c .katex { font-size: 1.05em; }
</style>
</head>
<body>
<div id="c"></div>
<script>
  marked.setOptions({ gfm: true, breaks: true });

  function reportHeight() {
    try { window.webkit.messageHandlers.h.postMessage(document.getElementById('c').scrollHeight); }
    catch (e) {}
  }

  // md: markdown string, dark: bool. Called by Swift on every streaming delta.
  function render(md, dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('hl').setAttribute('href', dark ? 'hl-dark.css' : 'hl-light.css');
    var el = document.getElementById('c');
    el.innerHTML = marked.parse(md || '');
    el.querySelectorAll('pre code').forEach(function (b) { try { hljs.highlightElement(b); } catch (e) {} });
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\(', right: '\\)', display: false }
        ],
        throwOnError: false
      });
    } catch (e) {}
    reportHeight();
    requestAnimationFrame(reportHeight);   // after layout
    setTimeout(reportHeight, 60);          // after math fonts settle
  }
</script>
</body>
</html>
